services:
  postgres:
    image: postgres:15
    container_name: fleettrack_db
    restart: always
    environment:
      POSTGRES_DB: fleettrack
      POSTGRES_USER: fleetuser
      POSTGRES_PASSWORD: fleetpass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fleettrack_backend
    restart: always
    ports:
      - "8001:8000"
    environment:
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: fleettrack
      DB_USERNAME: fleetuser
      DB_PASSWORD: fleetpass
    depends_on:
      - postgres
    volumes:
      - ./backend:/var/www/html

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fleettrack_frontend
    restart: always
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  pgdata:
